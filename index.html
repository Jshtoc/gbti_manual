<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GBTI 게임 매뉴얼</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #2d5f38;
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 60px;
    }

    .container {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ─── Header ─── */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      align-self: flex-start;
    }
    .header h1 {
      background-color: #f5efcc;
      color: #1e3a22;
      padding: 10px 28px;
      border-radius: 999px;
      font-size: clamp(18px, 5vw, 26px);
      font-weight: 900;
    }

    /* ─── Nav ─── */
    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
      justify-content: center;
      width: 100%;
    }
    .nav-btn {
      background-color: #f5efcc;
      color: #1e3a22;
      border: none;
      padding: 9px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .nav-btn:hover  { background-color: #f5e07a; }
    .nav-btn.active { background-color: #f0c430; }

    /* ─── Card: positioned container for overlays ─── */
    .card {
      position: relative;
      display: none;
      width: 100%;
    }
    .card.active { display: block; }

    /* ─── Image wrapper ─── */
    .img-wrap {
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
    }

    /* PC: 이미지 자연스럽게, 너무 길면 75vh 제한 */
    .img-wrap img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 75vh;
      object-fit: contain;
      border-radius: 20px;
      background: #f5efcc;
    }

    /* ─── 모바일: 가로 스크롤 ─── */
    @media (max-width: 767px) {
      .img-wrap {
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        border-radius: 20px;
      }
      .img-wrap::-webkit-scrollbar { display: none; }

      .img-wrap img {
        width: auto;
        min-width: 580px;
        max-width: none;
        max-height: none;
        object-fit: unset;
        background: none;
        border-radius: 0;
        cursor: default;
      }
    }

    /* ─── 스크롤 힌트: card 기준 정중앙 (모바일만) ─── */
    .scroll-hint {
      display: none;
    }

    @media (max-width: 767px) {
      .scroll-hint {
        display: flex;
        position: absolute;
        top: 50%;
        left: 50%;
        /* 기본 위치 (sway 시작점 포함) */
        transform: translate(calc(-50% - 8px), -50%);
        z-index: 10;
        align-items: center;
        gap: 8px;
        background: rgba(0, 0, 0, 0.58);
        color: #fff;
        padding: 9px 20px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 700;
        pointer-events: none;
        white-space: nowrap;
        animation: hint-sway 1.3s ease-in-out infinite;
        transition: opacity 0.35s ease;
      }
      .scroll-hint.hide {
        opacity: 0;
      }
    }

    @keyframes hint-sway {
      0%   { transform: translate(calc(-50% - 8px), -50%); }
      50%  { transform: translate(calc(-50% + 8px), -50%); }
      100% { transform: translate(calc(-50% - 8px), -50%); }
    }

    /* ─── 확대 버튼 (항상 표시) ─── */
    .zoom-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.15s;
    }
    .zoom-btn:hover { background: rgba(0,0,0,0.75); }

    /* ─── 라이트박스 ─── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }

    #lightbox img {
      max-width: 95vw;
      max-height: 95vh;
      object-fit: contain;
      border-radius: 12px;
      cursor: default;
    }

    #lightbox-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    #lightbox-close:hover { background: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <h1>GBTI 게임 매뉴얼</h1>
    </div>

    <!-- Navigation -->
    <nav class="nav">
      <button class="nav-btn active" onclick="show('server', this)">서버 입장 가이드</button>
      <button class="nav-btn" onclick="show('lol', this)">롤 · 칼바 · 오버 · 발로 · 배그</button>
      <button class="nav-btn" onclick="show('steam', this)">STEAM 게임</button>
      <button class="nav-btn" onclick="show('thread', this)">스레드 만들기</button>
    </nav>

    <!-- server -->
    <div class="card active" id="card-server">
      <div class="img-wrap" id="wrap-server">
        <img src="server.jpg" alt="서버 입장 가이드" />
      </div>
      <div class="scroll-hint" id="hint-server">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        좌우로 스크롤하세요
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <button class="zoom-btn" onclick="openZoom('server.jpg')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        확대
      </button>
    </div>

    <!-- lol -->
    <div class="card" id="card-lol">
      <div class="img-wrap" id="wrap-lol">
        <img src="lol.png" alt="롤·칼바·오버워치·발로란트·배그 게임 모집" />
      </div>
      <div class="scroll-hint" id="hint-lol">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        좌우로 스크롤하세요
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <button class="zoom-btn" onclick="openZoom('lol.png')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        확대
      </button>
    </div>

    <!-- steam -->
    <div class="card" id="card-steam">
      <div class="img-wrap" id="wrap-steam">
        <img src="steam.png" alt="STEAM 게임 투표 만들기" />
      </div>
      <div class="scroll-hint" id="hint-steam">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        좌우로 스크롤하세요
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <button class="zoom-btn" onclick="openZoom('steam.png')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        확대
      </button>
    </div>

    <!-- thread -->
    <div class="card" id="card-thread">
      <div class="img-wrap" id="wrap-thread">
        <img src="thread.png" alt="스레드 만들기" />
      </div>
      <div class="scroll-hint" id="hint-thread">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        좌우로 스크롤하세요
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <button class="zoom-btn" onclick="openZoom('thread.png')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        확대
      </button>
    </div>

  </div>

  <!-- 라이트박스 -->
  <div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()" />
    <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  </div>

  <script>
    function show(id, btn) {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('card-' + id).classList.add('active');
      btn.classList.add('active');

      // 탭 전환 시 스크롤 위치·힌트 리셋
      const wrap = document.querySelector('#card-' + id + ' .img-wrap');
      const hint = document.querySelector('#card-' + id + ' .scroll-hint');
      if (wrap) wrap.scrollLeft = 0;
      if (hint) hint.classList.remove('hide');
    }

    // 스크롤 시 힌트 숨김 (img-wrap 기준)
    document.querySelectorAll('.img-wrap').forEach(wrap => {
      const hint = wrap.closest('.card').querySelector('.scroll-hint');
      if (!hint) return;
      let hidden = false;
      wrap.addEventListener('scroll', () => {
        if (!hidden && wrap.scrollLeft > 8) {
          hidden = true;
          hint.classList.add('hide');
        }
      }, { passive: true });
    });

    // PC에서 이미지 클릭 시 확대
    if (window.innerWidth >= 768) {
      document.querySelectorAll('.img-wrap img').forEach(img => {
        img.style.cursor = 'zoom-in';
        img.addEventListener('click', () => openZoom(img.src));
      });
    }

    function openZoom(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>
</body>
</html>
