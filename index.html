<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GBTI 게임 매뉴얼</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #2d5f38;
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 60px;
    }

    .container {
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ─── Header ─── */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      align-self: flex-start;
    }
    .header h1 {
      background-color: #f5efcc;
      color: #1e3a22;
      padding: 10px 28px;
      border-radius: 999px;
      font-size: clamp(18px, 5vw, 26px);
      font-weight: 900;
    }

    /* ─── Nav ─── */
    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
      justify-content: center;
      width: 100%;
    }
    .nav-btn {
      background-color: #f5efcc;
      color: #1e3a22;
      border: none;
      padding: 9px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .nav-btn:hover  { background-color: #f5e07a; }
    .nav-btn.active { background-color: #f0c430; }

    /* ─── Image card ─── */
    .card {
      display: none;
      width: 100%;
    }
    .card.active { display: block; }

    .card img {
      width: 100%;
      height: auto;
      border-radius: 20px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <svg width="52" height="52" viewBox="0 0 100 100">
        <path d="M50 8 C72 4,94 22,92 46 C90 68,72 93,50 93 C28 93,8 70,8 48 C8 26,28 12,50 8Z" fill="#5ab96b"/>
        <circle cx="38" cy="46" r="7" fill="white"/>
        <circle cx="62" cy="46" r="7" fill="white"/>
        <circle cx="40" cy="47" r="3.5" fill="#1e3a22"/>
        <circle cx="64" cy="47" r="3.5" fill="#1e3a22"/>
        <circle cx="42" cy="44" r="1.5" fill="white"/>
        <circle cx="66" cy="44" r="1.5" fill="white"/>
        <circle cx="30" cy="58" r="5" fill="#f0a0a0" opacity="0.55"/>
        <circle cx="70" cy="58" r="5" fill="#f0a0a0" opacity="0.55"/>
        <path d="M39 63 Q50 73 61 63" stroke="#1e3a22" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <circle cx="37" cy="20" r="4" fill="#f0c430"/>
        <circle cx="63" cy="18" r="3" fill="#f0c430"/>
      </svg>
      <h1>GBTI 게임 매뉴얼</h1>
    </div>

    <!-- Navigation -->
    <nav class="nav">
      <button class="nav-btn active" onclick="show('server', this)">서버 입장 가이드</button>
      <button class="nav-btn" onclick="show('lol', this)">롤 · 칼바 · 오버 · 발로 · 배그</button>
      <button class="nav-btn" onclick="show('steam', this)">STEAM 게임</button>
      <button class="nav-btn" onclick="show('thread', this)">스레드 만들기</button>
    </nav>

    <!-- Cards -->
    <div class="card active" id="card-server">
      <img src="server.jpg" alt="서버 입장 가이드" />
    </div>

    <div class="card" id="card-lol">
      <img src="lol.png" alt="롤·칼바·오버워치·발로란트·배그 게임 모집" />
    </div>

    <div class="card" id="card-steam">
      <img src="steam.jpg" alt="STEAM 게임 투표 만들기" />
    </div>

    <div class="card" id="card-thread">
      <img src="thread.png" alt="스레드 만들기" />
    </div>

  </div>

  <script>
    function show(id, btn) {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('card-' + id).classList.add('active');
      btn.classList.add('active');
    }
  </script>
</body>
</html>
